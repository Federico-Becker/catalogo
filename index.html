<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo · Meri Jimenez</title>
<meta name="description" content="Catálogo de productos Natura y Avon — Meri Jimenez. Perfumes, cuidado personal y más. Consultá por WhatsApp.">
<meta property="og:title" content="Catálogo Meri Jimenez">
<meta property="og:description" content="Productos Natura y Avon. Perfumes, cuidado corporal, maquillaje y más.">
<meta property="og:type" content="website">
<meta name="theme-color" content="#3D2314">
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">Meri <span>♥</span></div>
  <div class="topbar-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(245,239,230,0.6)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="handleSearch(this.value)" autocomplete="off">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">×</button>
  </div>
</div>

<header class="hero">
  <p class="hero-eyebrow">Catálogo 2026 · Disponibles</p>
  <h1>Mi <em>Catálogo</em></h1>
  <p class="hero-sub">Natura · Avon · Cuidado personal</p>
  <div class="hero-heart">Meri Jimenez ♥</div>
</header>

<nav class="cat-tabs" id="catTabs">
  <button class="cat-tab active" onclick="showSection('oferta',this)">Oferta</button>
</nav>

<div id="searchSection">
  <h2 class="section-title">Resultados de <em>búsqueda</em></h2>
  <div class="section-divider"></div>
  <div class="products-grid" id="searchGrid"></div>
</div>

<main id="mainSections">
  <section class="section visible" id="section-oferta">
    <h2 class="section-title">Oferta de la <em>semana</em></h2>
    <div class="section-divider"></div>
    <div class="products-grid" id="featured-grid"></div>
  </section>
</main>

<footer>
  <p>© 2026 <a href="https://wa.me/5491136534668">Meri Jimenez</a> · @meri_heroes</p>
  <p style="margin-top:6px;">Productos Natura &amp; Avon · Consultá disponibilidad por WhatsApp</p>
  <button class="footer-admin-link" onclick="location.href='/admin'">·</button>
</footer>

<script src="/js/catalog.js"></script>
</body>
</html>
